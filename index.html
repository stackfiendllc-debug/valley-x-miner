<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>VALLEY X MINER</h1>
    <p>Official VLX Mining Dashboard</p>
  </header>

  <section class="dashboard">
    <h2>Mining Dashboard</h2>

    <div class="wallet-box">
      <p>Status: <span id="walletStatus">Disconnected</span></p>
      <p>Balance: <span id="walletBalance">0.000000000 VLX</span></p>
      <p>Mining Rate: <strong>0.000000050 VLX / 30s</strong></p>
    </div>

    <div class="button-group">
      <button id="connectWallet">Connect Phantom</button>
      <button id="startMining">Start Mining</button>
    </div>
  </section>

  <footer>
    <p>© 2026 Valley X Token | Secure Mining Protocol</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>

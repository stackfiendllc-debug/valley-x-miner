<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <img src="logo.jpeg" id="logo" class="logo" />

  <h1>VALLEY X</h1>

  <div class="wallet-box">
    <button onclick="connectWallet()">Connect Phantom</button>
    <p id="wallet-status">Wallet not connected</p>
  </div>

  <div class="stats">
    <p>Hash Rate: <span id="hashRate">0</span> H/s</p>
    <p>Mined VLX: <span id="vlxBalance">0.0000</span></p>
  </div>

  <div class="controls">
    <button onclick="startMining()">Start Mining</button>
    <button onclick="stopMining()">Stop Mining</button>
    <button onclick="claimVLX()">Claim VLX</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

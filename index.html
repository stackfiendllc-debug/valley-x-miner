<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <img id="logo" src="logo.png" alt="VLX Logo" class="logo">

    <h1>Valley X Miner</h1>
    <p class="subtitle">Mine and Claim VLX</p>

    <div class="wallet-card">
      <h3>Wallet</h3>
      <p id="walletText">Not Connected</p>
    </div>

    <div class="balance-card">
      <h2>Available VLX</h2>
      <p id="balanceText">0.000000000 VLX</p>
    </div>

    <div class="button-group">
      <button id="connectBtn">Connect Phantom</button>
      <button id="mineBtn">Start Mining</button>
      <button id="claimBtn">Claim VLX</button>
    </div>

    <div class="info-box">
      <p>Mining runs every 30 seconds</p>
      <p>Minimum claim: 0.01 VLX</p>
    </div>

  </div>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <script src="app.js"></script>

</body>
</html>

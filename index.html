<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <img src="logo.jpeg" class="logo" alt="VLX Logo" />

    <h1>Valley X Miner</h1>
    <p>Mine VLX Tokens</p>

    <div class="stats">
      <h2 id="balance">0 VLX</h2>
    </div>

    <button id="mineBtn">Start Mining</button>
    <button id="walletBtn">Open / Connect Phantom</button>

    <p id="status">Ready to mine</p>
  </div>

  <script src="script.js"></script>
</body>
</html>

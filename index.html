<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valley X Miner</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

.container{
    max-width:420px;
    margin:30px auto;
    padding:20px;
    background:#111;
    border:2px solid #ff7a00;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,122,0,0.35);
}

.logo{
    width:160px;
    border-radius:50%;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 10px #ff7a00;
    }
    to{
        box-shadow:0 0 35px #ffb300;
    }
}

h1{
    color:#ff9900;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff7a00,#ffb300);
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

.stat{
    background:#1b1b1b;
    padding:15px;
    border-radius:12px;
    margin:12px 0;
}

.value{
    color:#ffb300;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <img src="logo.jpeg" class="logo">

    <h1>VALLEY X MINER</h1>

    <button onclick="connectWallet()">Connect Phantom</button>
    <button onclick="startMining()">Start Mining</button>

    <div class="stat">
        Wallet: <span id="wallet">Not Connected</span>
    </div>

    <div class="stat">
        Balance: <span class="value" id="balance">0.000000000 VLX</span>
    </div>

    <div class="stat">
        Rate: <span class="value">0.000000050 / 30 sec</span>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>

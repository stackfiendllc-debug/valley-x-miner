<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valley X Miner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="./logo.png" class="logo" id="logo">
    <h1>VALLEY X MINER</h1>
    <p>Continuous Decentralized Mining</p>
</header>

<div class="container">

    <div class="card">
        Wallet: <span id="walletAddress">Not Connected</span>
    </div>

    <div class="card">
        Hash Rate: <span id="hashRate">0 H/s</span>
    </div>

    <div class="card reward-card">
        VLX Earned: <span id="rewardDisplay">0.000000 VLX</span>
    </div>

    <div class="buttons">
        <button onclick="connectWallet()">Connect Phantom</button>
        <button onclick="startMining()">Start Mining</button>
        <button onclick="stopMining()">Stop Mining</button>
        <button onclick="claimVLX()">Claim VLX</button>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>

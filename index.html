<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VLX Miner</title>
  <script defer src="app.js"></script>
</head>
<body style="background:black;color:red;text-align:center;font-family:Arial;padding:40px;">

  <h1>VALLEY X MINER</h1>

  <p>Wallet: <span id="wallet">Not Connected</span></p>
  <p>Status: <span id="status">Idle</span></p>

  <h2>Mined: <span id="balance">0.000000 VLX</span></h2>
  <h2>Claimed: <span id="claimed">0.000000 VLX</span></h2>

  <button id="connectBtn">Connect Wallet</button>
  <button id="mineBtn">Start Mining</button>
  <button id="claimBtn">Claim VLX</button>

</body>
</html>

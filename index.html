<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="app-shell">

  <header class="topbar">
    <img id="logo" src="logo.png" alt="VLX Logo">
    <h1>VALLEY X</h1>
    <p class="subtitle">Future Mining Protocol</p>
  </header>

  <section class="wallet-card">
    <h3>Connected Wallet</h3>
    <p id="walletText">Not Connected</p>
    <button id="connectBtn">Connect Phantom</button>
  </section>

  <section class="mining-card">
    <h3>VLX Balance</h3>
    <div id="balanceText">0.000000000 VLX</div>

    <div class="hash-box">
      <span>Hash Rate</span>
      <span id="hashRate">0 H/s</span>
    </div>

    <button id="mineBtn">Start Mining</button>
    <button id="claimBtn">Claim VLX</button>
  </section>

  <section class="status-card">
    <p>Status: <span id="statusText">Idle</span></p>
    <p>Minimum Claim: 0.01 VLX</p>
  </section>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
</html>

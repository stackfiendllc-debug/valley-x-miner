<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <img 
      src="./logo.png" 
      alt="VLX Logo" 
      class="logo"
      onerror="this.style.display='none'"
    >

    <h1>VALLEY X MINER</h1>
    <p class="subtitle">Mine Valley X Token</p>

    <div class="dashboard">

        <div class="balance-box">
            <h2>VLX Earned</h2>
            <p id="balance">0.00 VLX</p>
        </div>

        <button id="walletBtn">Connect Phantom</button>
        <button id="mineBtn">Start Mining</button>

        <p id="status">Connect wallet to begin</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

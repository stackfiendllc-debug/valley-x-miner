<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo" alt="Valley X Logo" />

  <h1>VALLEY X MINER</h1>

  <div class="button-group">
    <button id="connectBtn">Connect Wallet</button>
    <button id="mineBtn">Start Mining</button>
    <button id="claimBtn" onclick="claimRewards()">Claim Rewards</button>
  </div>

  <div class="card">
    <strong>Wallet:</strong>
    <span id="wallet">Not Connected</span>
  </div>

  <div class="card">
    <strong>Rewards:</strong>
    <span id="balance">0.000000050 VLX</span>
  </div>

  <div class="card">
    <strong>Claimed Total:</strong>
    <span id="claimed">0.000000000 VLX</span>
  </div>

  <div class="card">
    <strong>Status:</strong>
    <span id="status">Ready</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js?v=6"></script>

</body>
</html>

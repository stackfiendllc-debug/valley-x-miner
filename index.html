<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">

    <header>
      <img src="logo.jpeg" alt="VLX Logo" class="logo" />
      <h1>VALLEY X MINER</h1>
      <p>Secure Phantom Connected Mining Dashboard</p>
    </header>

    <div class="wallet-section">
      <button id="connectBtn">Connect Phantom</button>
      <p id="walletAddress">Not Connected</p>
    </div>

    <div class="mining-section">
      <h2>Mining Balance</h2>
      <p id="balance">0.00000000 VLX</p>

      <button id="mineBtn">Start Mining</button>
      <button id="testBtn">Test Button</button>
    </div>

    <div class="status-section">
      <p id="status">System Ready</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

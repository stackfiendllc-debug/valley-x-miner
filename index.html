<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-shell">

  <header class="topbar">
    <img id="logo" src="logo.png" alt="Valley X Logo">
    <h1>Valley X Miner</h1>
  </header>

  <main class="dashboard">

    <section class="wallet-panel">
      <h3>Connected Wallet</h3>
      <p id="walletText">Not Connected</p>
      <button id="connectBtn">Connect Phantom</button>
    </section>

    <section class="mining-panel">
      <h2>Your VLX Balance</h2>
      <div class="balance-display">
        <span id="balanceText">0.000000000 VLX</span>
      </div>

      <div class="action-buttons">
        <button id="mineBtn">Start Mining</button>
        <button id="claimBtn">Claim VLX</button>
      </div>
    </section>

    <section class="status-panel">
      <p>Mining interval: 30 seconds</p>
      <p>Minimum Claim: 0.01 VLX</p>
    </section>

  </main>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valley X Miner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="VLX Logo">

    <h1>VALLEY X MINER</h1>

    <button id="connectBtn">Connect Phantom</button>
    <button id="mineBtn">Start Mining</button>

    <div class="card">
        <p>Wallet: <span id="wallet">Not Connected</span></p>
    </div>

    <div class="card">
        <p>Balance: <span id="balance">0.000000000 VLX</span></p>
    </div>

    <div class="card">
        <p>Status: <span id="status">Idle</span></p>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
